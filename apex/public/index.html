<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex</title>
  <style>
    :root {
      --bg:#0f172a;
      --bg2:#111827;
      --card:rgba(255,255,255,0.08);
      --card-strong:rgba(255,255,255,0.12);
      --border:rgba(255,255,255,0.10);
      --text:#e5eefc;
      --muted:#94a3b8;
      --accent:#60a5fa;
      --green:#22c55e;
      --red:#ef4444;
      --shadow:0 10px 30px rgba(0,0,0,0.25);
      --radius:20px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,sans-serif;background:linear-gradient(180deg,#0f172a 0%,#111827 100%);color:var(--text)}
    .app{max-width:520px;margin:0 auto;min-height:100vh;padding:18px 16px 96px;position:relative}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:12px}.logo{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,#60a5fa,#2563eb);box-shadow:var(--shadow)}
    .title{font-size:22px;font-weight:700}.subtitle{font-size:12px;color:var(--muted)}
    .iconBtn{width:44px;height:44px;border-radius:14px;border:1px solid var(--border);background:var(--card);backdrop-filter:blur(18px);color:var(--text)}
    .glass{background:var(--card);border:1px solid var(--border);backdrop-filter:blur(18px);box-shadow:var(--shadow);border-radius:var(--radius)}
    .card{padding:16px}.section{display:none}.section.active{display:block}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stack{display:grid;gap:12px}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .kpiVal{font-size:24px;font-weight:800;margin-top:8px}.kpiLabel{font-size:12px;color:var(--muted)}
    .ringWrap{display:flex;justify-content:center;align-items:center;padding:8px 0 12px}
    .ring{width:190px;height:190px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(#60a5fa var(--pct), rgba(255,255,255,0.08) 0)}
    .ringInner{width:146px;height:146px;border-radius:50%;background:#0f172a;display:grid;place-items:center;text-align:center;border:1px solid var(--border)}
    .big{font-size:28px;font-weight:800}.small{font-size:12px;color:var(--muted)}
    .chartBox{height:220px;padding-top:4px}.barRow{display:flex;align-items:end;gap:10px;height:150px;margin-top:16px}
    .barCol{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}.bar{width:100%;border-radius:14px 14px 6px 6px;background:linear-gradient(180deg,#60a5fa,#2563eb);min-height:10px}.bar2{background:linear-gradient(180deg,#34d399,#059669)}
    .barLbl{font-size:11px;color:var(--muted)}.barVal{font-size:11px}
    .list{display:grid;gap:10px}.sale,.task{padding:14px}.saleTop,.taskTop{display:flex;justify-content:space-between;gap:12px}.saleTitle{font-size:14px;font-weight:600}.saleMeta,.taskMeta{font-size:12px;color:var(--muted)}
    .profitPos{color:var(--green);font-weight:700}.profitNeg{color:var(--red);font-weight:700}
    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px} input{width:100%;padding:13px 14px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text)}
    button{width:100%;padding:14px;border:none;border-radius:16px;font-weight:700;color:white;background:#334155} .btnGreen{background:linear-gradient(180deg,#22c55e,#16a34a)} .btnRed{background:linear-gradient(180deg,#ef4444,#dc2626)}
    .calcResult{padding:14px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid var(--border)}
    .bottomTabs{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;width:min(490px,calc(100vw - 20px));display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;border-radius:22px;background:rgba(15,23,42,0.78);border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(18px);box-shadow:var(--shadow)}
    .tabBtn{padding:12px 8px;border-radius:16px;background:transparent;border:none;color:var(--muted);font-size:12px}.tabBtn.active{background:rgba(255,255,255,0.10);color:var(--text)}
    .sidebar{position:fixed;top:0;left:0;height:100vh;width:min(380px,88vw);background:rgba(15,23,42,0.96);backdrop-filter:blur(18px);border-right:1px solid var(--border);transform:translateX(-100%);transition:.25s;padding:18px;z-index:20}.sidebar.open{transform:translateX(0)}
    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.45);opacity:0;pointer-events:none;transition:.2s;z-index:19}.backdrop.show{opacity:1;pointer-events:auto}
    .skeleton{position:relative;overflow:hidden;background:rgba(255,255,255,0.05)} .skeleton::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);animation:shine 1.3s infinite}
    @keyframes shine{100%{transform:translateX(100%)}}
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="top" style="margin-bottom:20px"><div><div class="title">Menü</div><div class="subtitle">Settings & Ziele</div></div><button class="iconBtn" id="closeSidebar">✕</button></div>
    <div class="glass card stack">
      <div>
        <div class="subtitle">Ziel-Konfiguration</div>
        <label>Jahresziel</label>
        <input id="yearGoal" value="25000" />
        <label>Tagesziel</label>
        <input id="dayGoal" value="2000" />
      </div>
      <div>
        <div class="subtitle">Settings</div>
        <label>GKV Limit</label><input id="gkvLimit" value="578" />
        <label>Profit Goal</label><input id="profitGoal" value="15000" />
        <label>Default Fee %</label><input id="defaultFeePct" value="12" />
        <label>Default Fee Fix</label><input id="defaultFeeFix" value="0.35" />
      </div>
      <button id="saveAll">Speichern</button>
    </div>
  </div>
  <div class="backdrop" id="backdrop"></div>

  <div class="app">
    <div class="top">
      <button class="iconBtn" id="openSidebar">☰</button>
      <div style="text-align:right">
        <div class="title">Apex</div>
        <div class="subtitle" id="syncState">syncing…</div>
      </div>
    </div>

    <section class="section active" id="dashboardSection">
      <div class="ringWrap glass card">
        <div class="ring" id="progressRing" style="--pct:0deg">
          <div class="ringInner">
            <div>
              <div class="small">Tagesziel</div>
              <div class="big" id="todayProgress">0€</div>
              <div class="small" id="todaySub">von 2.000€</div>
            </div>
          </div>
        </div>
      </div>
      <div class="kpis" id="kpis"></div>
      <div class="glass card">
        <div class="title" style="font-size:16px">Profit / Revenue</div>
        <div class="chartBox" id="chartBox"></div>
      </div>
    </section>

    <section class="section" id="salesSection">
      <div class="glass card" style="margin-bottom:12px">
        <div class="title" style="font-size:16px">Sales</div>
        <div class="subtitle">Nur Einträge mit gültiger Order-ID zählen</div>
      </div>
      <div class="list" id="salesList"></div>
    </section>

    <section class="section" id="calcSection">
      <div class="glass card stack">
        <div class="title" style="font-size:16px">Smart Calc</div>
        <div class="row">
          <div><label>VK</label><input id="calcVk" type="number" value="25" /></div>
          <div><label>EK</label><input id="calcEk" type="number" value="8" /></div>
        </div>
        <div><label>SKU (für Versand via _VK / _VP)</label><input id="calcSku" value="01_01_01_01_EK2_VK_5" /></div>
        <button id="calcBtn">Berechnen</button>
        <div class="calcResult" id="calcResult">Noch keine Berechnung.</div>
      </div>
    </section>

    <section class="section" id="tasksSection">
      <div class="glass card stack">
        <div class="title" style="font-size:16px">Tasks</div>
        <div class="row"><input id="todoTitle" placeholder="Neue Aufgabe" /><button id="todoBtn">Add</button></div>
      </div>
      <div class="list" id="taskList" style="margin-top:12px"></div>
    </section>
  </div>

  <nav class="bottomTabs">
    <button class="tabBtn active" data-tab="dashboardSection">Dashboard</button>
    <button class="tabBtn" data-tab="salesSection">Sales</button>
    <button class="tabBtn" data-tab="calcSection">Calc</button>
    <button class="tabBtn" data-tab="tasksSection">Tasks</button>
  </nav>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { metrics:null, sales:null, todos:null, settings:null, yearGoal:25000, dayGoal:2000 };

    async function api(url, opts) {
      const res = await fetch(url, opts);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }
    const euro = (v) => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(Number(v||0));
    const fmtDate = (d) => d ? new Date(d).toLocaleDateString('de-DE') : '-';

    function setLoading() {
      $('kpis').innerHTML = Array.from({length:4}).map(()=>`<div class="glass card skeleton" style="height:96px"></div>`).join('');
      $('salesList').innerHTML = Array.from({length:5}).map(()=>`<div class="glass sale skeleton" style="height:76px"></div>`).join('');
      $('taskList').innerHTML = Array.from({length:4}).map(()=>`<div class="glass task skeleton" style="height:74px"></div>`).join('');
      $('chartBox').innerHTML = `<div class="skeleton" style="height:180px;border-radius:16px"></div>`;
    }

    function calcTodayRevenue(rows) {
      const today = new Date().toISOString().slice(0,10);
      return rows.filter(r => String(r.date || '').slice(0,10) === today).reduce((a,r)=>a + Number(r.vk||0),0);
    }

    function renderDashboard() {
      const m = state.metrics;
      const todayRevenue = calcTodayRevenue(state.sales || []);
      const pct = Math.max(0, Math.min(1, todayRevenue / state.dayGoal));
      $('progressRing').style.setProperty('--pct', `${pct * 360}deg`);
      $('todayProgress').textContent = euro(todayRevenue);
      $('todaySub').textContent = `von ${euro(state.dayGoal)}`;
      $('kpis').innerHTML = [
        ['Monatsgewinn', euro(m.monthProfit)],
        ['Gesamtgewinn', euro(m.totalProfit)],
        ['GKV Rest', euro(m.gkvRemaining)],
        ['Verkäufe', m.salesCount],
      ].map(([k,v])=>`<div class="glass card"><div class="kpiLabel">${k}</div><div class="kpiVal">${v}</div></div>`).join('');

      const sales = state.sales || [];
      const recent = sales.slice(0,7).reverse();
      const maxProfit = Math.max(1, ...recent.map(r => Math.abs(Number(r.profit)||0)));
      const maxRevenue = Math.max(1, ...recent.map(r => Math.abs(Number(r.vk)||0)));
      $('chartBox').innerHTML = `
        <div class="barRow">
          ${recent.map(r => `
            <div class="barCol">
              <div class="barVal">${euro(r.profit)}</div>
              <div class="bar" style="height:${Math.max(10,(Math.abs(r.profit)/maxProfit)*110)}px"></div>
              <div class="bar bar2" style="height:${Math.max(10,(Math.abs(r.vk)/maxRevenue)*60)}px"></div>
              <div class="barLbl">${fmtDate(r.date).slice(0,5)}</div>
            </div>
          `).join('')}
        </div>`;
    }

    function renderSales() {
      const rows = state.sales || [];
      $('salesList').innerHTML = rows.length ? rows.map(r => `
        <div class="glass sale">
          <div class="saleTop">
            <div>
              <div class="saleTitle">${r.title || '-'}</div>
              <div class="saleMeta">${fmtDate(r.date)} · ${r.orderId || '-'}</div>
            </div>
            <div class="${Number(r.profit) >= 0 ? 'profitPos' : 'profitNeg'}">${euro(r.profit)}</div>
          </div>
        </div>`).join('') : `<div class="glass sale">Keine gültigen Sales.</div>`;
    }

    function renderTasks() {
      const rows = state.todos || [];
      $('taskList').innerHTML = rows.length ? rows.map(r => `
        <div class="glass task">
          <div class="taskTop">
            <div>
              <div class="saleTitle">${r.title}</div>
              <div class="taskMeta">${r.status} · ${r.owner}</div>
            </div>
            <div class="taskMeta">${fmtDate(r.createdAt)}</div>
          </div>
        </div>`).join('') : `<div class="glass task">Keine Tasks.</div>`;
    }

    async function loadSales() {
      const raw = await api('/sales');
      state.sales = raw.rows || [];
    }

    async function loadTodos() {
      const raw = await api('/todos');
      const rows = raw.rows || [];
      state.todos = rows.map(r => ({ createdAt:r[0], title:r[1], status:r[2], owner:r[3], note:r[4] }));
    }

    async function loadSettings() {
      const raw = await api('/settings');
      state.settings = raw.settings || {};
      $('gkvLimit').value = state.settings.gkvLimit ?? 578;
      $('profitGoal').value = state.settings.profitGoal ?? 15000;
      $('defaultFeePct').value = state.settings.defaultFeePct ?? 12;
      $('defaultFeeFix').value = state.settings.defaultFeeFix ?? 0.35;
    }

    async function loadMetrics() { state.metrics = await api('/metrics'); }

    async function saveAll() {
      state.yearGoal = Number($('yearGoal').value || 25000);
      state.dayGoal = Number($('dayGoal').value || 2000);
      const items = [
        ['gkvLimit', Number($('gkvLimit').value)],
        ['profitGoal', Number($('profitGoal').value)],
        ['defaultFeePct', Number($('defaultFeePct').value)],
        ['defaultFeeFix', Number($('defaultFeeFix').value)],
      ];
      for (const [key, value] of items) {
        await api('/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ key, value, type:'number', note:'Updated from Apex Fintech UI' }) });
      }
      await Promise.all([loadMetrics(), loadSettings()]);
      renderDashboard();
      toggleSidebar(false);
    }

    async function calc() {
      const body = { expectedVk:Number($('calcVk').value), ek:Number($('calcEk').value), sku:$('calcSku').value };
      const out = await api('/sourcing/check', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      $('calcBtn').className = out.go === 'GO' ? 'btnGreen' : 'btnRed';
      $('calcResult').innerHTML = `<div class="${out.go === 'GO' ? 'profitPos' : 'profitNeg'}" style="font-size:20px;font-weight:800">${out.go}</div><div>Profit: ${euro(out.profit)}</div><div>Fees: ${euro(out.fees)}</div><div>Shipping: ${euro(out.shippingCost)}</div>`;
    }

    async function addTask() {
      const title = $('todoTitle').value.trim();
      if (!title) return;
      await api('/todos', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ title, status:'open', owner:'Raul', note:'UI task' }) });
      $('todoTitle').value = '';
      await loadTodos();
      renderTasks();
    }

    function toggleSidebar(show) {
      $('sidebar').classList.toggle('open', show);
      $('backdrop').classList.toggle('show', show);
    }

    async function boot() {
      setLoading();
      try {
        await Promise.all([loadMetrics(), loadSettings(), loadSales(), loadTodos()]);
        renderDashboard();
        renderSales();
        renderTasks();
        $('syncState').textContent = 'live sync';
      } catch (e) {
        $('syncState').textContent = 'sync error';
        console.error(e);
      }
    }

    [...document.querySelectorAll('.tabBtn')].forEach(btn => btn.onclick = () => {
      document.querySelectorAll('.tabBtn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      $(btn.dataset.tab).classList.add('active');
    });
    $('openSidebar').onclick = () => toggleSidebar(true);
    $('closeSidebar').onclick = () => toggleSidebar(false);
    $('backdrop').onclick = () => toggleSidebar(false);
    $('saveAll').onclick = saveAll;
    $('calcBtn').onclick = calc;
    $('todoBtn').onclick = addTask;
    boot();
  </script>
</body>
</html>
